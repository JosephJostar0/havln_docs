site_name: HA-VLN Docs
site_description: Documentation for the HA-VLN human-aware navigation dataset and environments
theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins: []

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Start Here: index.md
  - 1. Install HASimulator and Get Data: participant/install_and_data.md
  - 2. Develop an Agent: participant/develop_agent.md
  - 3. Test an Agent: participant/test_agent.md
  - Reference:
      - Dependencies: quick_start/dependencies.md
      - Installation Steps: quick_start/installation.md
      - Data Download: quick_start/data.md
      - Agent Integration Notes: quick_start/integration.md
      - Human State Queries: api/human_state.md
      - Dynamic Scene Updates: api/scene_updates.md
      - Collision Checks: api/collision_checks.md
      - Evaluation Metrics: api/evaluation_metrics.md
