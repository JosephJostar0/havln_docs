site_name: HA-VLN Docs
site_description: Participant documentation for HA-VLN
repo_url: https://github.com/F1y1113/HA-VLN
repo_name: F1y1113/HA-VLN
theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins: []

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Start Here: index.md
  - Environment & Data: participant/install_and_data.md
  - Develop Your Agent: participant/develop_agent.md
  - Test Your Agent: participant/test_agent.md
  - Agent Integration Notes: quick_start/integration.md
  - Reference:
      - Dependencies: quick_start/dependencies.md
      - Installation Steps: quick_start/installation.md
      - Data Download: quick_start/data.md
      - Human State Queries: api/human_state.md
      - Dynamic Scene Updates: api/scene_updates.md
      - Collision Checks: api/collision_checks.md
      - Evaluation Metrics: api/evaluation_metrics.md
  - Challenge Workflow:
      - How To Participate: challenge/overview.md
      - Action Sequence Format: challenge/action_sequence_format.md
      - Agent Package And Local Validation: challenge/agent_package_validation.md
